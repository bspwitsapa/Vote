<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ผลการโหวต - นักเรียนดีเป็นศรีบางสะพาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #15803d;
      --primary-dark: #14532d;
      --accent:       #facc15;
      --bg:           #f8fafc;
      --card:         #ffffff;
      --text:         #064e3b;
      --muted:        #64748b;
      --divider:      #e2e8f0;
      --gold:         #FFD700;
      --silver:       #C0C0C0;
      --bronze:       #CD7F32;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 40px 20px;
      text-align: center;
      color: #fff;
      width: 100%;
      border-bottom: 6px solid var(--accent);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .container {
      width: 100%;
      max-width: 1000px;
      padding: 40px 20px;
    }

    .grade-section {
      margin-bottom: 50px;
    }

    .grade-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 25px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--accent);
      display: inline-block;
    }

    .winners-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    .winner-card {
      background: #fff;
      border-radius: 24px;
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
      border: 1.5px solid var(--divider);
      transition: 0.3s;
    }
    .winner-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-color: var(--accent); }

    .rank-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      color: #fff;
    }
    .rank-1 { background: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
    .rank-2 { background: var(--silver); }
    .rank-3 { background: var(--bronze); }

    .winner-avatar {
      width: 150px;
      height: 150px;
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
      background: #f1f5f9;
      border: 4px solid #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .winner-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .winner-avatar svg { width: 60%; height: 60%; margin: 20% auto; display: block; opacity: 0.3; }

    .winner-info h3 { font-size: 1.6rem; font-weight: 800; margin-bottom: 5px; }
    .winner-info p { font-size: 1.1rem; color: var(--muted); font-weight: 600; margin-bottom: 15px; }
    .vote-pill {
      display: inline-block;
      padding: 8px 20px;
      background: var(--primary);
      color: #fff;
      border-radius: 30px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .btn-back {
      margin-top: 20px;
      padding: 12px 30px;
      background: #fff;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: 30px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s;
      display: inline-block;
    }
    .btn-back:hover { background: var(--primary); color: #fff; }

    @media (max-width: 600px) {
      .winner-card { flex-direction: column; text-align: center; padding-top: 50px; }
      .winner-avatar { width: 120px; height: 120px; }
      .rank-badge { top: 15px; right: 15px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏆 ผลการโหวตนักเรียนดีเด่น</h1>
  <p>สรุปคะแนนสูงสุดในแต่ละระดับชั้น</p>
  <a href="vote.html" class="btn-back" style="background: rgba(255,255,255,0.2); border-color: #fff; color: #fff; margin-top: 25px;">⬅ กลับหน้าหลัก</a>
</header>

<div class="container" id="resultsContainer">
  <div style="text-align: center; padding: 50px; color: var(--muted);">⌛ กำลังโหลดผลการคะแนน...</div>
</div>

<script type="module">
  import { fb } from './firebase-module.js';

  async function loadResults() {
    const candidates = await fb.getCandidates();
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '';

    for (let g = 1; g <= 6; g++) {
      const gradeCandidates = candidates
        .filter(c => c.grade === g)
        .sort((a, b) => b.voteCount - a.voteCount)
        .slice(0, 3); // Top 3

      if (gradeCandidates.length === 0) continue;

      const section = document.createElement('div');
      section.className = 'grade-section';
      section.innerHTML = `<h2 class="grade-title">ระดับชั้น ม.${g}</h2>`;

      const grid = document.createElement('div');
      grid.className = 'winners-grid';

      gradeCandidates.forEach((c, index) => {
        const rank = index + 1;
        grid.innerHTML += `
          <div class="winner-card">
            <div class="rank-badge rank-${rank}">${rank}</div>
            <div class="winner-avatar">
              ${c.imageUrl ? `<img src="${c.imageUrl}" alt="${c.name}"/>` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>`}
            </div>
            <div class="winner-info">
              <h3>${c.name}</h3>
              <p>นักเรียนชั้น ม.${c.grade}/${c.room}</p>
              <div class="vote-pill">${c.voteCount} คะแนน</div>
            </div>
          </div>
        `;
      });

      section.appendChild(grid);
      container.appendChild(section);
    }

    if (container.innerHTML === '') {
      container.innerHTML = '<div style="text-align: center; padding: 50px; color: var(--muted);">ยังไม่มีข้อมูลการโหวตในระบบ</div>';
    }
  }

  loadResults();
</script>
</body>
</html>
