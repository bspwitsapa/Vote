<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ระบบโหวตนักเรียนดีเป็นศรีบางสะพาน</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:   #15803d; /* BSPWIT Green */
      --primary-dark: #14532d; /* BSPWIT Dark Green */
      --accent:    #facc15; /* Yellow */
      --bg:        #f1f5f9;
      --card:      #ffffff;
      --text:      #064e3b;
      --muted:     #64748b;
      --divider:   #e2e8f0;
      --danger:    #dc2626;
    }
    html, body {
      min-height: 100vh;
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      width: 100%;
      overflow-x: hidden;
    }
    .card {
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      border-top: 8px solid var(--accent);
      position: relative;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 45px 30px;
      text-align: center;
      color: #fff;
      position: relative;
    }
    .hero-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .hero img.logo {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: #fff;
      padding: 3px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      object-fit: contain;
    }
    .hero h1 { font-size: 1.5rem; font-weight: 800; line-height: 1.3; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .hero p { font-size: 0.95rem; opacity: 0.85; margin-top: 10px; font-weight: 400; }
    .hero-year {
      display: inline-block;
      margin-top: 18px;
      font-size: .85rem;
      font-weight: 700;
      color: var(--primary-dark);
      background: var(--accent);
      border-radius: 30px;
      padding: 6px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .tabs { display: grid; grid-template-columns: 1fr 1fr; background: #f8fafc; }
    .tab-btn {
      padding: 18px; border: none; background: transparent; color: var(--muted);
      font-weight: 700; cursor: pointer; transition: 0.3s; font-family: inherit;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.active { background: #fff; color: var(--primary); border-bottom-color: var(--primary); }

    .form-body { padding: 35px; }
    .form-section { display: none; }
    .form-section.active { display: block; animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .form-title { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .field input, .field select {
      width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 14px;
      font-family: inherit; font-size: 1rem; transition: 0.25s; outline: none; box-sizing: border-box;
      background: #fdfdfd;
    }
    .field input:focus, .field select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.1); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .field-hint { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

    .btn-submit {
      width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none;
      border-radius: 14px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: 0.25s;
      margin-top: 15px; font-family: inherit; box-shadow: 0 6px 20px rgba(21, 128, 61, 0.25);
    }
    .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(21, 128, 61, 0.35); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg-box {
      padding: 14px; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      margin-bottom: 20px; display: none; text-align: center;
    }
    .msg-box.show { display: block; }
    .msg-box.error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .msg-box.success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

    .pw-strength-bar { height: 6px; border-radius: 3px; background: #e2e8f0; margin-top: 10px; overflow: hidden; }
    .pw-strength-fill { height: 100%; width: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .pw-strength-label { font-size: 0.75rem; color: var(--muted); margin-top: 5px; font-weight: 600; }

    .admin-link-wrap { 
      text-align: center; 
      margin-top: 30px; 
      padding: 20px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 0 0 28px 28px;
    }
    .admin-link-wrap p { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
    .btn-admin {
      background: #fff; 
      color: var(--primary); 
      border: 2px solid var(--primary);
      padding: 10px 30px; 
      border-radius: 25px; 
      font-size: 0.9rem; 
      font-weight: 800; 
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn-admin:hover { 
      background: var(--primary); 
      color: #fff; 
      box-shadow: 0 6px 15px rgba(21, 128, 61, 0.3);
      transform: translateY(-2px);
    }

    /* Admin Overlay */
    #adminOverlay {
      position: fixed; inset: 0; background: rgba(6, 78, 59, 0.85); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
      padding: 20px;
    }
    #adminOverlay.open { opacity: 1; pointer-events: auto; }
    .admin-modal {
      background: #fff; padding: 40px; border-radius: 28px; width: 100%; max-width: 420px;
      position: relative; box-shadow: 0 30px 70px rgba(0,0,0,0.4);
      border-top: 8px solid var(--accent);
    }
    .btn-close {
      position: absolute; top: 20px; right: 20px; background: none; border: none;
      font-size: 1.4rem; cursor: pointer; color: var(--muted); transition: 0.2s;
    }
    .btn-close:hover { color: var(--danger); transform: rotate(90deg); }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .hero { padding: 35px 20px; }
      .form-body { padding: 25px; }
      .card { border-radius: 0; min-height: 100vh; max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="hero">
    <div class="hero-logos">
      <img src="logo.png" class="logo" alt="BSPWIT Logo"/>
    </div>
    <h1>ระบบโหวตนักเรียนดีเป็นศรีบางสะพาน</h1>
    <p>Student Voting System (BSPWIT)</p>
    <span class="hero-year">ประจำปีการศึกษา 2569</span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabRegister" onclick="switchTab('register')">ลงทะเบียน</button>
    <button class="tab-btn" id="tabLogin" onclick="switchTab('login')">เข้าสู่ระบบ</button>
  </div>

  <div class="form-body">
    <div class="form-section active" id="sectionRegister">
      <div class="form-title">📝 สร้างบัญชีนักเรียน</div>
      <div class="msg-box" id="regMsg"></div>
      <div class="field">
        <label>เลขประจำตัวนักเรียน</label>
        <input type="text" id="regID" maxlength="5" placeholder="ตัวเลข 5 หลัก" oninput="this.value=this.value.replace(/\D/g,'')"/>
        <div class="field-hint">ตัวเลข 5 หลักที่โรงเรียนออกให้</div>
      </div>
      <div class="field">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="regName" placeholder="เช่น สมชาย ใจดี"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label>ระดับชั้น</label>
          <select id="regGrade" onchange="updateRoomOptions('regRoom', this.value)">
            <option value="">-- เลือกชั้น --</option>
            <option value="1">ม.1</option><option value="2">ม.2</option><option value="3">ม.3</option>
            <option value="4">ม.4</option><option value="5">ม.5</option><option value="6">ม.6</option>
          </select>
        </div>
        <div class="field">
          <label>ห้อง</label>
          <select id="regRoom" disabled><option value="">-- เลือกชั้นก่อน --</option></select>
        </div>
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="regPass" placeholder="อย่างน้อย 6 ตัวอักษร" oninput="checkStrength(this.value)"/>
        <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwFill"></div></div>
        <div class="pw-strength-label" id="pwLabel">—</div>
      </div>
      <div class="field">
        <label>ยืนยันรหัสผ่าน</label>
        <input type="password" id="regPassConfirm" placeholder="พิมพ์รหัสผ่านอีกครั้ง"/>
      </div>
      <button class="btn-submit" id="btnRegister" onclick="doRegister()">สร้างบัญชี</button>
    </div>

    <div class="form-section" id="sectionLogin">
      <div class="form-title">🔑 เข้าสู่ระบบ</div>
      <div class="msg-box" id="loginMsg"></div>
      <div class="field">
        <label>เลขประจำตัวนักเรียน</label>
        <input type="text" id="loginID" maxlength="5" placeholder="ตัวเลข 5 หลัก" oninput="this.value=this.value.replace(/\D/g,'')"/>
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="loginPass" placeholder="รหัสผ่านของคุณ" onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn-submit" id="btnLogin" onclick="doLogin()">เข้าสู่ระบบ</button>
      <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--muted);">
        ยังไม่มีบัญชี? <a href="#" onclick="switchTab('register'); return false;" style="color:var(--primary); font-weight:700; text-decoration:none;">ลงทะเบียนที่นี่</a>
      </p>
    </div>
  </div>

  <div class="admin-link-wrap">
    <p>สำหรับผู้ดูแลระบบเท่านั้น</p>
    <button class="btn-admin" onclick="openAdminOverlay()">👨‍🏫 เข้าสู่ระบบผู้ดูแล</button>
  </div>
</div>

<div id="adminOverlay">
  <div class="admin-modal">
    <button class="btn-close" onclick="closeAdminOverlay()">✕</button>
    <h3 style="color:var(--primary)">👨‍🏫 ผู้ดูแลระบบ</h3>
    <div class="msg-box" id="adminMsg"></div>
    <div class="field">
      <label>รหัสผ่าน Admin</label>
      <input type="password" id="adminPass" placeholder="กรอกรหัสผ่าน" onkeydown="if(event.key==='Enter') doAdminLogin()"/>
    </div>
    <button class="btn-submit" id="btnAdminLogin" onclick="doAdminLogin()">เข้าสู่ระบบ Admin</button>
    <div style="text-align:center; margin-top:15px; font-size:0.8rem; color:var(--muted);">
      ยังไม่มีบัญชี? <a href="#" onclick="doCreateAdmin()" style="color:var(--primary); font-weight:bold; text-decoration:none;">สร้างบัญชี Admin ครั้งแรก</a>
    </div>
  </div>
</div>

<script type="module">
  import { fb } from './firebase-module.js';

  const CLASSROOMS_COUNT = 13;

  // Handle Auth State
  fb.onAuthState((user) => {
    if (user) {
      console.log("Logged in as:", user.email);
    } else {
      console.log("Logged out");
      sessionStorage.removeItem('currentUser');
    }
  });

  window.switchTab = function(tab) {
    document.getElementById('sectionRegister').classList.toggle('active', tab === 'register');
    document.getElementById('sectionLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    clearMsg('regMsg'); clearMsg('loginMsg');
  }

  window.updateRoomOptions = function(selectId, grade) {
    const sel = document.getElementById(selectId);
    sel.innerHTML = '<option value="">-- เลือกห้อง --</option>';
    if (!grade) { sel.disabled = true; return; }
    sel.disabled = false;
    for (let r = 1; r <= CLASSROOMS_COUNT; r++) {
      const opt = document.createElement('option');
      opt.value = r; opt.textContent = `ห้อง ${r}`;
      sel.appendChild(opt);
    }
  }

  window.checkStrength = function(pw) {
    const fill = document.getElementById('pwFill');
    const label = document.getElementById('pwLabel');
    let score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) || /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    const levels = [
      { w:'0%', bg:'transparent', txt:'—' },
      { w:'25%', bg:'#ef4444', txt:'อ่อนมาก' },
      { w:'50%', bg:'#f97316', txt:'พอใช้' },
      { w:'75%', bg:'#eab308', txt:'ดี' },
      { w:'100%', bg:'#10b981', txt:'แข็งแกร่ง' }
    ];
    const lv = pw.length === 0 ? 0 : Math.min(score, 4);
    fill.style.width = levels[lv].w;
    fill.style.background = levels[lv].bg;
    label.textContent = levels[lv].txt;
  }

  function showMsg(id, text, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg-box ${type} show`;
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'msg-box';
    el.textContent = '';
  }

    window.doRegister = async function() {
    clearMsg('regMsg');
    const id = document.getElementById('regID').value.trim();
    const name = document.getElementById('regName').value.trim();
    const grade = document.getElementById('regGrade').value;
    const room = document.getElementById('regRoom').value;
    const pass = document.getElementById('regPass').value;
    const confirm = document.getElementById('regPassConfirm').value;

    // Security: Only allow 5-digit numeric student IDs for registration
    if (!/^\d{5}$/.test(id)) { 
      showMsg('regMsg','⚠️ เลขประจำตัวต้องเป็นตัวเลข 5 หลักเท่านั้น'); 
      return; 
    }
    
    if (!name) { showMsg('regMsg','⚠️ กรุณากรอกชื่อ-นามสกุล'); return; }
    if (!grade) { showMsg('regMsg','⚠️ กรุณาเลือกระดับชั้น'); return; }
    if (!room) { showMsg('regMsg','⚠️ กรุณาเลือกห้อง'); return; }
    if (pass.length < 6) { showMsg('regMsg','⚠️ รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
    if (pass !== confirm) { showMsg('regMsg','⚠️ รหัสผ่านไม่ตรงกัน'); return; }

    const btn = document.getElementById('btnRegister');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก...';

    try {
      await fb.registerUser({ studentID:id, name, grade:parseInt(grade), room:parseInt(room) }, pass);
      showMsg('regMsg', `✅ ลงทะเบียนสำเร็จ! ยินดีต้อนรับคุณ ${name}`, 'success');
      setTimeout(() => switchTab('login'), 2000);
    } catch (e) {
      let errorMsg = e.message;
      if (e.code === 'auth/email-already-in-use') errorMsg = 'เลขประจำตัวนี้ถูกลงทะเบียนแล้ว';
      if (e.code === 'auth/weak-password') errorMsg = 'รหัสผ่านอ่อนเกินไป';
      showMsg('regMsg', '❌ ' + errorMsg);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'สร้างบัญชี';
    }
  }

  window.doLogin = async function() {
    clearMsg('loginMsg');
    const id = document.getElementById('loginID').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (id.length !== 5 || !pass) { showMsg('loginMsg','⚠️ กรุณากรอกข้อมูลให้ครบ'); return; }

    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>กำลังเข้าสู่ระบบ...';

    try {
      const user = await fb.loginUser(id, pass);
      sessionStorage.setItem('currentUser', JSON.stringify({ ...user, isAdmin:false }));
      showMsg('loginMsg', `✅ เข้าสู่ระบบสำเร็จ ยินดีต้อนรับ ${user.name}`, 'success');
      setTimeout(() => window.location.href = 'vote.html', 1200);
    } catch (e) {
      let errorMsg = 'เลขประจำตัวหรือรหัสผ่านไม่ถูกต้อง';
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
        errorMsg = 'เลขประจำตัวหรือรหัสผ่านไม่ถูกต้อง';
      }
      showMsg('loginMsg', '❌ ' + errorMsg);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ';
    }
  }

  window.openAdminOverlay = () => { document.getElementById('adminOverlay').classList.add('open'); clearMsg('adminMsg'); }
  window.closeAdminOverlay = () => { document.getElementById('adminOverlay').classList.remove('open'); }
  
  window.doAdminLogin = async function() {
    clearMsg('adminMsg');
    const pass = document.getElementById('adminPass').value;
    if (!pass) { showMsg('adminMsg','⚠️ กรุณากรอกรหัสผ่าน'); return; }

    const btn = document.getElementById('btnAdminLogin');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>กำลังตรวจสอบ...';

    try {
      // Login as admin using Firebase Auth
      const user = await fb.loginUser('admin', pass);
      sessionStorage.setItem('currentUser', JSON.stringify({ ...user, isAdmin:true }));
      showMsg('adminMsg', `✅ เข้าสู่ระบบผู้ดูแลสำเร็จ`, 'success');
      setTimeout(() => window.location.href = 'vote.html', 1200);
    } catch (e) {
      showMsg('adminMsg', '❌ รหัสผ่าน Admin ไม่ถูกต้อง หรือยังไม่ได้สร้างบัญชี Admin');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ Admin';
    }
  }

  window.doCreateAdmin = async function() {
    clearMsg('adminMsg');
    const pass = document.getElementById('adminPass').value;
    if (pass.length < 6) { 
      showMsg('adminMsg','⚠️ กรุณากรอกรหัสผ่านที่ต้องการสร้างบัญชี (อย่างน้อย 6 ตัว)'); 
      return; 
    }

    const btn = document.getElementById('btnAdminLogin');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>กำลังดำเนินการ...';

    try {
      // Attempt registration directly
      await fb.registerUser({ 
        studentID: 'admin', 
        name: 'System Admin', 
        grade: 0, 
        room: 0 
      }, pass);
      
      showMsg('adminMsg', '✅ สร้างบัญชี Admin สำเร็จ! คุณสามารถเข้าสู่ระบบได้ทันที', 'success');
      // Success: We can even hide the link now
    } catch (e) {
      if (e.code === 'auth/email-already-in-use') {
        showMsg('adminMsg', '❌ มีบัญชี Admin อยู่ในระบบแล้ว (ไม่สามารถสร้างซ้ำได้)');
      } else {
        showMsg('adminMsg', '❌ เกิดข้อผิดพลาด: ' + e.message);
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ Admin';
    }
  }
</script>
</body>
</html>
